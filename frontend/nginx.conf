# Servidor HTTP para SPA (Vite/React Router): ficheiros estáticos + fallback para index.html
server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para reduzir tráfego (texto, JSON, SVG, etc.)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
